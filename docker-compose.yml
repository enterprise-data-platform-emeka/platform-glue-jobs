services:
  glue:
    # AWS Glue 4.0 image — Spark 3.3, Python 3.10, Hadoop 3.3.
    # On Apple Silicon Macs this runs under Rosetta 2 (linux/amd64).
    # The image is ~3 GB and only needs to be pulled once.
    platform: linux/amd64
    image: amazon/aws-glue-libs:glue_libs_4.0.0_image_01

    # Mount the workspace so job code and data are available inside the container.
    # Changes to lib/ and jobs/ on the host are reflected immediately — no rebuild needed.
    volumes:
      - ./data:/home/glue_user/workspace/data
      - ./lib:/home/glue_user/workspace/lib
      - ./jobs:/home/glue_user/workspace/jobs
      - ./scripts:/home/glue_user/workspace/scripts
      # Persist Spark event logs to the host so the History Server can read them
      # after the job container exits. spark-defaults.conf already sets
      # spark.eventLog.enabled=true and spark.history.fs.logDirectory=/tmp/spark-events.
      - ./spark-events:/tmp/spark-events

    working_dir: /home/glue_user/workspace

    # PYTHONPATH tells Spark workers where to find lib/ (our shared utilities).
    # DISABLE_SSL=true avoids certificate issues in the local Spark UI.
    environment:
      - PYTHONPATH=/home/glue_user/workspace
      - DISABLE_SSL=true
      - AWS_DEFAULT_REGION=eu-central-1

    # The image's default entrypoint generates SSL certs and starts the Spark
    # History Server before exec'ing the user's command. We do not override it.
    # Overridden per-run by `docker compose run glue /home/glue_user/jupyter/bin/gluesparksubmit ...`

  history-server:
    # Runs the Spark History Server so you can inspect completed job DAGs, stages,
    # and task timelines after a job finishes. Access at http://localhost:18080.
    # Start with: make spark-ui
    platform: linux/amd64
    image: amazon/aws-glue-libs:glue_libs_4.0.0_image_01
    ports:
      - "18080:18080"
    volumes:
      - ./spark-events:/tmp/spark-events
    environment:
      - DISABLE_SSL=true
      - AWS_DEFAULT_REGION=eu-central-1
    entrypoint: ["/home/glue_user/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    command: []
