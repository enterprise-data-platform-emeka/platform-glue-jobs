[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, N = naming, UP = pyupgrade
select = ["E", "F", "I", "N", "W", "UP"]
ignore = [
    "E501",   # line too long — ruff format handles this
    "N812",   # lowercase imported as non-lowercase — PySpark convention: `functions as F`
    "N816",   # mixedCase in global scope — Glue convention: `glueContext`
]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = true
strict_equality = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "glue: mark test as requiring the AWS Glue Docker container",
]
addopts = "-v"
